services:
  sing-box:
    build:
      context: ..
      dockerfile: docker/sing-box/Dockerfile
      args:
        SING_BOX_REF: v1.14.0-alpha.9
    image: local/sing-box:v1.14.0-alpha.9-v2ray-api
    container_name: sing-box
    restart: unless-stopped
    command: ["run", "-c", "/etc/sing-box/config.json"]
    volumes:
      - ../../data/sing-box:/etc/sing-box:ro
      - ../../data/sing-box-state:/var/lib/sing-box
    network_mode: host
    env_file:
      - .env

  ui:
    build:
      context: ..
      dockerfile: Dockerfile.dev
    container_name: sing-box-ui-dev
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NODE_OPTIONS: --max-old-space-size=4096
    volumes:
      - ..:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
      - ../../data/sing-box:/etc/sing-box
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../data:/data
    ports:
      - "3000:3000"
    command: npm run dev:docker
    depends_on:
      - sing-box

  worker:
    build:
      context: ..
      dockerfile: Dockerfile.dev
    command: npm run dev:worker
    volumes:
      - ..:/app
      - node_modules:/app/node_modules
      - ../../data:/data
    network_mode: host
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - sing-box

volumes:
  node_modules:
  next_cache:

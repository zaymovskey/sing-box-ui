name: Build image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short sha
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract UI Docker metadata
        id: meta_ui
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/zaymovskey/sing-box-ui
          tags: |
            type=raw,value=latest
            type=raw,value=sha-${{ steps.vars.outputs.short_sha }}

      - name: Build and push UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: runner
          push: true
          tags: ${{ steps.meta_ui.outputs.tags }}
          labels: ${{ steps.meta_ui.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SINGBOX_CERTS_DIR=${{ secrets.NEXT_PUBLIC_SINGBOX_CERTS_DIR }}

      - name: Extract Worker Docker metadata
        id: meta_worker
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/zaymovskey/sing-box-ui-worker
          tags: |
            type=raw,value=latest
            type=raw,value=sha-${{ steps.vars.outputs.short_sha }}

      - name: Build and push Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: worker-runner
          push: true
          tags: ${{ steps.meta_worker.outputs.tags }}
          labels: ${{ steps.meta_worker.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SINGBOX_CERTS_DIR=${{ secrets.NEXT_PUBLIC_SINGBOX_CERTS_DIR }}

      - name: Show image tags
        run: |
          echo "UI_IMAGE_TAG=sha-${GITHUB_SHA::7}"
          echo "WORKER_IMAGE_TAG=sha-${GITHUB_SHA::7}"

name: Deploy image

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - development
          - production
      image_tag:
        description: "Docker image tag to deploy (for example: sha-abc1234)"
        required: true
        default: "latest"

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    concurrency:
      group: deploy-${{ inputs.environment }}
      cancel-in-progress: false

    steps:
      - name: Resolve deploy path
        id: vars
        run: |
          if [ "${{ inputs.environment }}" = "production" ]; then
            echo "deploy_path=/root/sing-box-ui/docker" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_path=/root/sing-box-ui/docker" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            cd "${{ steps.vars.outputs.deploy_path }}"

            export IMAGE_TAG="${{ inputs.image_tag }}"

            echo "IMAGE_TAG=$IMAGE_TAG"
            docker compose config | grep image:

            docker compose pull ui
            docker compose up -d --force-recreate --remove-orphans ui

            echo "DEPLOY_ENV=${{ inputs.environment }}"
            echo "DEPLOY_PATH=${{ steps.vars.outputs.deploy_path }}"
            echo "IMAGE_TAG=$IMAGE_TAG"
            docker inspect sing-box-ui --format '{{.Config.Image}}'
